name: Deploy to Xserver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5

    - name: Run SEO link audit
      run: node scripts/audit-seo-links.mjs

    - name: Run SEO indexability audit
      run: node scripts/audit-seo-indexability.mjs

    - name: Run noindex intent audit
      run: node scripts/audit-noindex-intent.mjs

    - name: Run markdown artifact audit
      run: node scripts/audit-markdown-artifacts.mjs

    - name: Run structured data audit
      run: node scripts/audit-structured-data.mjs

    - name: Run LLMS audit
      run: node scripts/audit-llms.mjs

    - name: Run priority internal link audit
      run: node scripts/audit-priority-internal-links.mjs

    - name: Run hero preload audit
      run: node scripts/audit-hero-preload.mjs

    - name: Run private SEO data audit
      run: node scripts/audit-private-seo-data.mjs
    
    - name: Deploy to Xserver via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /digitool-lab.com/public_html/
        local-dir: ./
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.DS_Store
          **/README.md
          **/tools/**
          **/upload-all.sh
