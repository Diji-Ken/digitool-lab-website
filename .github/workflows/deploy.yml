name: Deploy to Xserver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5

    - name: Run SEO link audit
      run: node scripts/audit-seo-links.mjs

    - name: Run SEO indexability audit
      run: node scripts/audit-seo-indexability.mjs
    
    - name: Deploy to Xserver via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /digitool-lab.com/public_html/
        local-dir: ./
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.DS_Store
          **/README.md
          **/tools/**
          **/upload-all.sh
