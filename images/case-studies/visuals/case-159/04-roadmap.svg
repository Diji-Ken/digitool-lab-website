<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">法人ランチ提案の導入ロードマップ</title><desc id="desc">1業務を選び、試作し、並行運用し、実測して続行を判断する4段階</desc><rect width="1200" height="675" rx="32" fill="#F7F5F0"/>
  <text x="64" y="67" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#C2410C">想定モデル｜2〜4週間は目安</text><text x="64" y="108" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="30" font-weight="900" fill="#162033">法人ランチ提案を、1業務だけで試す</text><text x="64" y="142" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" fill="#667085">関係者、件数、既存ツールにより期間は変わります</text><path d="M146 292H1052" stroke="#D0D5DD" stroke-width="8" stroke-linecap="round"/><path d="M146 292H748" stroke="#F97316" stroke-width="8" stroke-linecap="round"/>
  <circle cx="146" cy="292" r="47" fill="#F97316"/><text x="146" y="302" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="29" font-weight="900" fill="#FFFFFF">1</text><rect x="64" y="365" width="248" height="218" rx="22" fill="#FFFFFF" stroke="#E6E1D8"/><text x="88" y="410" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">対象を1つ選ぶ</text><circle cx="92" cy="452" r="4" fill="#F97316"/><text x="107" y="457" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">紙・口頭が多い</text><circle cx="92" cy="486" r="4" fill="#F97316"/><text x="107" y="491" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">件数を数えられる</text><circle cx="92" cy="520" r="4" fill="#F97316"/><text x="107" y="525" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">確認者が決まる</text><circle cx="428" cy="292" r="47" fill="#F97316"/><text x="428" y="302" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="29" font-weight="900" fill="#FFFFFF">2</text><rect x="346" y="365" width="248" height="218" rx="22" fill="#FFFFFF" stroke="#E6E1D8"/><text x="370" y="410" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">画面を試作</text><circle cx="374" cy="452" r="4" fill="#F97316"/><text x="389" y="457" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">現場の言葉</text><circle cx="374" cy="486" r="4" fill="#F97316"/><text x="389" y="491" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">6項目から開始</text><circle cx="374" cy="520" r="4" fill="#F97316"/><text x="389" y="525" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">確認表まで接続</text><circle cx="710" cy="292" r="47" fill="#F97316"/><text x="710" y="302" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="29" font-weight="900" fill="#FFFFFF">3</text><rect x="628" y="365" width="248" height="218" rx="22" fill="#FFFFFF" stroke="#E6E1D8"/><text x="652" y="410" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">並行で試す</text><circle cx="656" cy="452" r="4" fill="#F97316"/><text x="671" y="457" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">紙も残す</text><circle cx="656" cy="486" r="4" fill="#F97316"/><text x="671" y="491" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">迷った点を記録</text><circle cx="656" cy="520" r="4" fill="#F97316"/><text x="671" y="525" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">AIの印を確認</text><circle cx="992" cy="292" r="47" fill="#162033"/><text x="992" y="302" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="29" font-weight="900" fill="#FFFFFF">4</text><rect x="910" y="365" width="248" height="218" rx="22" fill="#FFFFFF" stroke="#E6E1D8"/><text x="934" y="410" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">数字で判断</text><circle cx="938" cy="452" r="4" fill="#F97316"/><text x="953" y="457" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">提案準備時間</text><circle cx="938" cy="486" r="4" fill="#F97316"/><text x="953" y="491" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">契約候補数</text><circle cx="938" cy="520" r="4" fill="#F97316"/><text x="953" y="525" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">継続契約率</text>
  <text x="600" y="636" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#475467">続ける基準と、やめる基準を先に決めてから試します</text></svg>
