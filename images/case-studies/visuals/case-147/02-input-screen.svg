<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">ケア記録の入力画面</title><desc id="desc">患者ID、実施日時、観察内容、処置内容、連絡要否、備考を入力するスマートフォン画面の想定モデル</desc><rect width="1200" height="675" rx="32" fill="#162033"/>
  <text x="64" y="66" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#FDBA74">想定モデル｜現場用入力画面</text><text x="64" y="108" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="30" font-weight="900" fill="#FFFFFF">ケア記録は、迷わず6項目だけ</text><text x="64" y="140" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" fill="#CBD5E1">実際の紙・表・言葉に合わせて試作します</text>
  <rect x="64" y="185" width="350" height="420" rx="26" fill="#22304A"/><text x="94" y="228" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="900" fill="#FDBA74">入力を続けてもらう条件</text>
  <circle cx="108" cy="287" r="19" fill="#F97316"/><text x="108" y="293" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">1</text><text x="144" y="293" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="17" font-weight="900" fill="#FFFFFF">現場の言葉を使う</text><circle cx="108" cy="377" r="19" fill="#F97316"/><text x="108" y="383" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">2</text><text x="144" y="383" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="17" font-weight="900" fill="#FFFFFF">必須項目を絞る</text><circle cx="108" cy="467" r="19" fill="#F97316"/><text x="108" y="473" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">3</text><text x="144" y="473" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="17" font-weight="900" fill="#FFFFFF">紙との並行期間を置く</text>
  <rect x="94" y="503" width="290" height="72" rx="16" fill="#162033"/><text x="114" y="532" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#FDBA74">試作時に測る</text><text x="114" y="558" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#FFFFFF">入力時間と、迷った項目</text>
  <rect x="522" y="166" width="342" height="486" rx="38" fill="#0B1220" stroke="#667085" stroke-width="3"/><rect x="542" y="188" width="302" height="442" rx="28" fill="#F8FAFC"/><rect x="646" y="177" width="94" height="13" rx="7" fill="#344054"/><rect x="542" y="188" width="302" height="73" rx="28" fill="#FFF7ED"/><text x="568" y="219" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" font-weight="800" fill="#C2410C">医療介護</text><text x="568" y="246" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">ケア記録を入力</text>
  <text x="568" y="292" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" font-weight="800" fill="#344054">患者ID</text><rect x="568" y="303" width="116" height="38" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><rect x="580" y="319" width="60" height="6" rx="3" fill="#E4E7EC"/><text x="700" y="292" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" font-weight="800" fill="#344054">実施日時</text><rect x="700" y="303" width="116" height="38" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><rect x="712" y="319" width="72" height="6" rx="3" fill="#E4E7EC"/><text x="568" y="377" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" font-weight="800" fill="#344054">観察内容</text><rect x="568" y="388" width="116" height="38" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><rect x="580" y="404" width="84" height="6" rx="3" fill="#E4E7EC"/><text x="700" y="377" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" font-weight="800" fill="#344054">処置内容</text><rect x="700" y="388" width="116" height="38" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><rect x="712" y="404" width="60" height="6" rx="3" fill="#E4E7EC"/><text x="568" y="462" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" font-weight="800" fill="#344054">連絡要否</text><rect x="568" y="473" width="116" height="38" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><rect x="580" y="489" width="72" height="6" rx="3" fill="#E4E7EC"/><text x="700" y="462" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" font-weight="800" fill="#344054">備考</text><rect x="700" y="473" width="116" height="38" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><rect x="712" y="489" width="84" height="6" rx="3" fill="#E4E7EC"/>
  <rect x="568" y="555" width="250" height="46" rx="12" fill="#F97316"/><text x="693" y="584" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="900" fill="#FFFFFF">確認して送信</text>
  <rect x="920" y="231" width="216" height="268" rx="24" fill="#FFFFFF"/><circle cx="958" cy="274" r="18" fill="#FFF7ED"/><text x="958" y="281" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#F97316">!</text><text x="990" y="270" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="900" fill="#162033">送信前に確認</text><text x="990" y="292" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" fill="#667085">曖昧な言葉を表示</text><rect x="944" y="329" width="168" height="54" rx="12" fill="#FFF7ED"/><text x="958" y="352" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" fill="#667085">入力例</text><text x="958" y="373" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#C2410C">「経過は良好」</text><text x="944" y="420" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#162033">確認すること</text><text x="944" y="447" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#475467">判断根拠と次回確認を記録</text><text x="944" y="474" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" fill="#667085">AIは確定しません</text></svg>
