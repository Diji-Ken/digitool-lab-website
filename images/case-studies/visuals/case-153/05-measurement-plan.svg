<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">接客提案の測定計画</title><desc id="desc">確認済み実績ではなく、試行時に測る4つの指標</desc><rect width="1200" height="675" rx="32" fill="#162033"/>
  <rect x="60" y="48" width="222" height="38" rx="19" fill="#FFEDD5"/><text x="171" y="73" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#C2410C">実績ではなく測定計画</text><text x="60" y="129" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="30" font-weight="900" fill="#FFFFFF">結果は、試行前後を同じ方法で測る</text><text x="60" y="165" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" fill="#CBD5E1">接客提案を整えて客単価を2倍にした話</text>
  <rect x="60" y="218" width="510" height="145" rx="22" fill="#FFF7ED"/><circle cx="112" cy="271" r="24" fill="#F97316"/><text x="112" y="279" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#FFFFFF">1</text><text x="152" y="266" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">提案時間</text><text x="152" y="297" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#667085">開始前に測る → 試行後に同条件で測る</text><rect x="152" y="317" width="370" height="13" rx="7" fill="#E4E7EC"/><rect x="152" y="317" width="150" height="13" rx="7" fill="#F97316"/><rect x="600" y="218" width="510" height="145" rx="22" fill="#FFFFFF"/><circle cx="652" cy="271" r="24" fill="#162033"/><text x="652" y="279" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#FFFFFF">2</text><text x="692" y="266" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">聞き漏れ</text><text x="692" y="297" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#667085">開始前に測る → 試行後に同条件で測る</text><rect x="692" y="317" width="370" height="13" rx="7" fill="#E4E7EC"/><rect x="692" y="317" width="150" height="13" rx="7" fill="#F97316"/><rect x="60" y="392" width="510" height="145" rx="22" fill="#FFFFFF"/><circle cx="112" cy="445" r="24" fill="#162033"/><text x="112" y="453" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#FFFFFF">3</text><text x="152" y="440" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">再来店率</text><text x="152" y="471" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#667085">開始前に測る → 試行後に同条件で測る</text><rect x="152" y="491" width="370" height="13" rx="7" fill="#E4E7EC"/><rect x="152" y="491" width="150" height="13" rx="7" fill="#F97316"/><rect x="600" y="392" width="510" height="145" rx="22" fill="#FFFFFF"/><circle cx="652" cy="445" r="24" fill="#162033"/><text x="652" y="453" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#FFFFFF">4</text><text x="692" y="440" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#162033">メモ利用率</text><text x="692" y="471" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#667085">開始前に測る → 試行後に同条件で測る</text><rect x="692" y="491" width="370" height="13" rx="7" fill="#E4E7EC"/><rect x="692" y="491" width="150" height="13" rx="7" fill="#F97316"/>
  <rect x="60" y="586" width="1080" height="52" rx="14" fill="#0B1220"/><text x="600" y="618" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">数値が確認できるまでは「削減」「改善」を実績として表示しません</text></svg>
