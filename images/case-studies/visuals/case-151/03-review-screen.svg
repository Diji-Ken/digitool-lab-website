<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">イベント企画の確認画面</title><desc id="desc">変更や曖昧な記述から人が確認する画面の想定モデル</desc><rect width="1200" height="675" rx="32" fill="#F2F4F7"/>
