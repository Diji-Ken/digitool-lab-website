  <rect x="286" y="212" width="844" height="105" rx="14" fill="#FFF7ED" stroke="#FDBA74"/><text x="310" y="249" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#162033">曜日 A-01</text><text x="500" y="247" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#C2410C">「若い人向け」</text><text x="500" y="278" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" fill="#667085">AI: 年齢層と利用場面を確認</text><rect x="850" y="239" width="132" height="38" rx="19" fill="#F97316"/><text x="916" y="263" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF">人に確認</text>
