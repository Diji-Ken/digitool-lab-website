  <rect x="286" y="435" width="844" height="88" rx="14" fill="#FFFFFF" stroke="#E4E7EC"/><text x="310" y="474" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#162033">曜日 C-03</text><text x="500" y="474" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#344054">必須項目がそろっています</text><rect x="850" y="460" width="132" height="36" rx="18" fill="#ECFDF3"/><text x="916" y="483" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#027A48">確認済み</text>
  <rect x="286" y="549" width="844" height="70" rx="16" fill="#162033"/><text x="320" y="578" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#FDBA74">運用ルール</text><text x="320" y="603" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#FFFFFF">AIは確認候補まで。確定・顧客回答・優先順位は担当者が決めます。</text></svg>
