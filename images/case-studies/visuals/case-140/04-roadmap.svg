<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">小さく始める導入ロードマップ</title>
  <desc id="desc">業務選定、画面試作、並行運用、効果確認の4段階。期間は2から4週間の目安</desc>
  <rect width="1200" height="675" rx="32" fill="#F7F5F0"/>
  <text x="64" y="76" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="28" font-weight="800" fill="#162033">大きく作らず、1つの依頼業務で試す</text>
  <text x="64" y="110" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16" fill="#667085">2〜4週間は目安です。入力件数、関係者、既存ツールで変わります。</text>
  <path d="M145 304h905" stroke="#D0D5DD" stroke-width="8" stroke-linecap="round"/>
  <path d="M145 304h604" stroke="#F97316" stroke-width="8" stroke-linecap="round"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <g transform="translate(94 194)"><circle cx="52" cy="110" r="48" fill="#F97316"/><text x="52" y="120" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">1</text><rect x="0" y="186" width="230" height="194" rx="22" fill="#FFFFFF" stroke="#E6E1D8"/><text x="24" y="226" font-size="13" font-weight="800" fill="#C2410C">半日〜</text><text x="24" y="260" font-size="20" font-weight="800" fill="#162033">対象を1つ選ぶ</text><text x="24" y="294" font-size="14" fill="#475467">・紙や口頭が多い</text><text x="24" y="321" font-size="14" fill="#475467">・担当者が何度も聞く</text><text x="24" y="348" font-size="14" fill="#475467">・件数を数えられる</text></g>
    <g transform="translate(363 194)"><circle cx="52" cy="110" r="48" fill="#F97316"/><text x="52" y="120" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">2</text><rect x="0" y="186" width="230" height="194" rx="22" fill="#FFFFFF" stroke="#E6E1D8"/><text x="24" y="226" font-size="13" font-weight="800" fill="#C2410C">数日〜</text><text x="24" y="260" font-size="20" font-weight="800" fill="#162033">画面を試作する</text><text x="24" y="294" font-size="14" fill="#475467">・現場の言葉で6項目</text><text x="24" y="321" font-size="14" fill="#475467">・スマホで入力テスト</text><text x="24" y="348" font-size="14" fill="#475467">・確認表までつなぐ</text></g>
    <g transform="translate(632 194)"><circle cx="52" cy="110" r="48" fill="#F97316"/><text x="52" y="120" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">3</text><rect x="0" y="186" width="230" height="194" rx="22" fill="#FFFFFF" stroke="#E6E1D8"/><text x="24" y="226" font-size="13" font-weight="800" fill="#C2410C">1〜2週間</text><text x="24" y="260" font-size="20" font-weight="800" fill="#162033">紙と並行で試す</text><text x="24" y="294" font-size="14" fill="#475467">・入力時間を測る</text><text x="24" y="321" font-size="14" fill="#475467">・困った場面を直す</text><text x="24" y="348" font-size="14" fill="#475467">・AIの印を人が確認</text></g>
    <g transform="translate(901 194)"><circle cx="52" cy="110" r="48" fill="#162033"/><text x="52" y="120" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">4</text><rect x="0" y="186" width="230" height="194" rx="22" fill="#FFFFFF" stroke="#E6E1D8"/><text x="24" y="226" font-size="13" font-weight="800" fill="#475467">判断</text><text x="24" y="260" font-size="20" font-weight="800" fill="#162033">数字で続行判断</text><text x="24" y="294" font-size="14" fill="#475467">・1件あたりの時間</text><text x="24" y="321" font-size="14" fill="#475467">・確認の差し戻し</text><text x="24" y="348" font-size="14" fill="#475467">・現場の継続意向</text></g>
  </g>
  <rect x="64" y="612" width="1072" height="1" fill="#D0D5DD"/>
  <text x="600" y="646" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="700" fill="#475467">続ける基準と、やめる基準を先に決めてから試します</text>
</svg>
