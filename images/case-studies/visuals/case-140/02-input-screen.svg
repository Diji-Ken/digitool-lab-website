<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">現場向け依頼入力画面の例</title>
  <desc id="desc">スマートフォンで30秒から1分を目安に入力する6項目の画面例</desc>
  <rect width="1200" height="675" rx="32" fill="#162033"/>
  <text x="66" y="72" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">現場は、迷わず6項目だけ</text>
  <text x="66" y="106" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16" fill="#CBD5E1">実際の項目名に合わせて試作する入力画面のイメージ</text>

  <rect x="64" y="146" width="360" height="470" rx="28" fill="#22304A"/>
  <text x="96" y="190" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16" font-weight="800" fill="#FDBA74">設計の考え方</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <circle cx="103" cy="242" r="18" fill="#F97316"/><text x="103" y="248" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF">1</text><text x="136" y="239" font-size="17" font-weight="800" fill="#FFFFFF">現場の言葉を使う</text><text x="136" y="264" font-size="14" fill="#CBD5E1">専門用語やシステム用語を避ける</text>
    <circle cx="103" cy="330" r="18" fill="#F97316"/><text x="103" y="336" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF">2</text><text x="136" y="327" font-size="17" font-weight="800" fill="#FFFFFF">変更だけ目立たせる</text><text x="136" y="352" font-size="14" fill="#CBD5E1">通常依頼と変更依頼を混ぜない</text>
    <circle cx="103" cy="418" r="18" fill="#F97316"/><text x="103" y="424" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF">3</text><text x="136" y="415" font-size="17" font-weight="800" fill="#FFFFFF">入力時間を測る</text><text x="136" y="440" font-size="14" fill="#CBD5E1">30秒〜1分が試作時の目安</text>
  </g>
  <rect x="94" y="490" width="300" height="90" rx="18" fill="#162033" stroke="#475467"/>
  <text x="118" y="522" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#FDBA74">紙をすぐ禁止しない</text>
  <text x="118" y="549" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#FFFFFF">最初は併用し、使いやすさを</text>
  <text x="118" y="570" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#FFFFFF">現場と一緒に直します。</text>

  <rect x="528" y="136" width="338" height="510" rx="38" fill="#0B1220" stroke="#667085" stroke-width="3"/>
  <rect x="548" y="158" width="298" height="466" rx="27" fill="#F8FAFC"/>
  <rect x="655" y="146" width="84" height="13" rx="7" fill="#344054"/>
  <rect x="548" y="158" width="298" height="72" rx="27" fill="#FFF7ED"/>
  <text x="574" y="190" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#C2410C">製造依頼</text>
  <text x="574" y="216" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20" font-weight="800" fill="#162033">依頼内容を入力</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <text x="574" y="263" font-size="12" font-weight="700" fill="#344054">取引先名</text><rect x="574" y="274" width="246" height="36" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><text x="590" y="297" font-size="13" fill="#667085">〇〇工業</text>
    <text x="574" y="337" font-size="12" font-weight="700" fill="#344054">型番</text><rect x="574" y="348" width="152" height="36" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><text x="590" y="371" font-size="13" fill="#667085">AB-120</text><text x="744" y="337" font-size="12" font-weight="700" fill="#344054">数量</text><rect x="744" y="348" width="76" height="36" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><text x="760" y="371" font-size="13" fill="#667085">12</text>
    <text x="574" y="411" font-size="12" font-weight="700" fill="#344054">希望納期</text><rect x="574" y="422" width="246" height="36" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><text x="590" y="445" font-size="13" fill="#667085">2026 / 07 / 24</text>
    <text x="574" y="485" font-size="12" font-weight="700" fill="#344054">変更がありますか？</text><rect x="574" y="496" width="118" height="35" rx="18" fill="#FFEDD5" stroke="#F97316"/><circle cx="595" cy="513" r="9" fill="#F97316"/><text x="613" y="518" font-size="13" font-weight="800" fill="#C2410C">変更あり</text><rect x="702" y="496" width="118" height="35" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/><text x="761" y="518" text-anchor="middle" font-size="13" fill="#667085">変更なし</text>
    <text x="574" y="555" font-size="12" font-weight="700" fill="#344054">備考</text><rect x="574" y="566" width="246" height="40" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/><text x="590" y="591" font-size="12" fill="#667085">梱包は前回と同じ</text>
  </g>
  <rect x="922" y="216" width="214" height="256" rx="24" fill="#FFFFFF"/>
  <circle cx="960" cy="258" r="18" fill="#ECFDF3"/><path d="m951 258 6 6 13-15" fill="none" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="992" y="254" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16" font-weight="800" fill="#162033">送信前チェック</text>
  <text x="992" y="275" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="12" fill="#667085">その場で不足を表示</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#344054">
    <text x="946" y="326">✓ 型番</text><text x="946" y="359">✓ 数量</text><text x="946" y="392">✓ 希望納期</text><text x="946" y="425" fill="#C2410C">! 曖昧な備考</text>
  </g>
  <rect x="922" y="492" width="214" height="90" rx="18" fill="#FFF7ED"/>
  <text x="946" y="526" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#C2410C">重要</text>
  <text x="946" y="551" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#344054">AIは確定せず、</text><text x="946" y="571" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#344054">確認候補だけ示します。</text>
</svg>
