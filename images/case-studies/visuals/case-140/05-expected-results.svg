<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">想定効果シミュレーション</title>
  <desc id="desc">月90件、1件25分から11分になった場合の想定計算。実績値ではなく試算であることを明示</desc>
  <rect width="1200" height="675" rx="32" fill="#162033"/>
  <rect x="60" y="48" width="220" height="38" rx="19" fill="#FFEDD5"/>
  <text x="170" y="73" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#C2410C">想定シミュレーション</text>
  <text x="60" y="132" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="30" font-weight="800" fill="#FFFFFF">削減幅ではなく、計算条件まで見せる</text>
  <text x="60" y="167" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16" fill="#CBD5E1">以下は元記事の条件を使った試算で、確認済みの導入実績ではありません。</text>

  <rect x="60" y="213" width="1080" height="120" rx="22" fill="#22304A"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <text x="92" y="250" font-size="14" font-weight="800" fill="#FDBA74">試算条件</text>
    <text x="92" y="292" font-size="22" font-weight="800" fill="#FFFFFF">月90件</text><text x="200" y="292" font-size="18" fill="#98A2B3">×</text><text x="242" y="292" font-size="22" font-weight="800" fill="#FFFFFF">1件25分</text><text x="372" y="292" font-size="18" fill="#98A2B3">→</text><text x="414" y="292" font-size="22" font-weight="800" fill="#FFFFFF">1件11分</text>
    <text x="579" y="292" font-size="15" fill="#CBD5E1">入力・確認の時間だけを比較</text>
  </g>

  <rect x="60" y="365" width="514" height="212" rx="24" fill="#FFFFFF"/>
  <text x="92" y="410" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#667085">1件あたり</text>
  <text x="92" y="464" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="36" font-weight="800" fill="#162033">25分</text><text x="225" y="464" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="24" fill="#98A2B3">→</text><text x="283" y="464" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="36" font-weight="800" fill="#F97316">11分</text>
  <rect x="92" y="500" width="412" height="22" rx="11" fill="#E4E7EC"/><rect x="92" y="500" width="181" height="22" rx="11" fill="#F97316"/>
  <text x="92" y="551" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#475467">差は14分。実測後に条件を更新します。</text>

  <rect x="626" y="365" width="514" height="212" rx="24" fill="#FFF7ED"/>
  <text x="658" y="410" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#C2410C">月間の想定差</text>
  <text x="658" y="473" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="54" font-weight="900" fill="#C2410C">約21時間</text>
  <text x="658" y="511" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" fill="#344054">90件 × 14分 ＝ 1,260分</text>
  <text x="658" y="546" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#667085">※入力件数や確認方法により実際の結果は変わります。</text>

  <rect x="60" y="607" width="1080" height="40" rx="12" fill="#0B1220"/>
  <text x="600" y="632" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">導入判断では「時間」だけでなく、差し戻し件数・入力率・現場の負担も一緒に測ります</text>
</svg>
