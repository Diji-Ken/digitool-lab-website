<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">紙と口頭の依頼を一つの入口に整えるBefore・After</title>
  <desc id="desc">紙、電話、メール、口頭が事務担当に集中する状態から、一つの入力画面、自動整理、AIの確認候補、人の確定へ変わる流れ</desc>
  <rect width="1200" height="675" rx="32" fill="#F7F5F0"/>
  <text x="72" y="74" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="28" font-weight="800" fill="#162033">依頼の入口をそろえると、確認の順番が見える</text>
  <text x="72" y="108" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16" fill="#667085">AIの前に、まず情報の入り方を整える</text>

  <rect x="54" y="144" width="500" height="472" rx="28" fill="#FFFFFF" stroke="#E6E1D8" stroke-width="2"/>
  <rect x="76" y="166" width="108" height="34" rx="17" fill="#FEE2E2"/>
  <text x="130" y="189" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#B42318">BEFORE</text>
  <text x="76" y="238" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="22" font-weight="800" fill="#162033">情報がバラバラに届く</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="700" fill="#344054">
    <rect x="84" y="282" width="146" height="70" rx="16" fill="#FFF7ED" stroke="#FDBA74"/>
    <path d="M112 302h52v34h-52z" fill="#fff" stroke="#F97316" stroke-width="2"/><path d="M121 312h34M121 320h27M121 328h31" stroke="#F97316" stroke-width="2"/>
    <text x="190" y="324" text-anchor="middle">紙メモ</text>
    <rect x="84" y="370" width="146" height="70" rx="16" fill="#FFF7ED" stroke="#FDBA74"/>
    <path d="M120 391c-8 3-8 25 0 28l8-7c8 6 12 8 20 10l7-9c-10-4-18-12-22-22z" fill="none" stroke="#F97316" stroke-width="3"/>
    <text x="190" y="412" text-anchor="middle">電話・口頭</text>
    <rect x="84" y="458" width="146" height="70" rx="16" fill="#FFF7ED" stroke="#FDBA74"/>
    <rect x="113" y="478" width="48" height="31" rx="4" fill="#fff" stroke="#F97316" stroke-width="2"/><path d="m115 481 22 16 22-16" fill="none" stroke="#F97316" stroke-width="2"/>
    <text x="190" y="500" text-anchor="middle">メール</text>
  </g>
  <g stroke="#F04438" stroke-width="3" fill="none" marker-end="url(#redArrow)">
    <path d="M242 317C300 317 313 359 356 383"/>
    <path d="M242 405h105"/>
    <path d="M242 493c58 0 71-42 114-66"/>
  </g>
  <defs>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#F04438"/></marker>
    <marker id="navyArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#344054"/></marker>
  </defs>
  <circle cx="419" cy="404" r="67" fill="#FEE4E2"/>
  <circle cx="419" cy="381" r="20" fill="#F97066"/><path d="M383 440c4-31 18-45 36-45s32 14 36 45" fill="#F97066"/>
  <text x="419" y="487" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16" font-weight="800" fill="#B42318">事務担当に集中</text>
  <text x="419" y="516" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#667085">探す・聞く・写す</text>
  <rect x="84" y="556" width="416" height="42" rx="12" fill="#FEF3F2"/>
  <text x="292" y="582" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="700" fill="#B42318">変更が入るたび、どれが最新版か再確認</text>

  <rect x="646" y="144" width="500" height="472" rx="28" fill="#162033"/>
  <rect x="668" y="166" width="98" height="34" rx="17" fill="#FFEDD5"/>
  <text x="717" y="189" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#C2410C">AFTER</text>
  <text x="668" y="238" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">同じ入口から、人が確定する</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <rect x="674" y="290" width="102" height="162" rx="18" fill="#FFFFFF"/>
    <rect x="698" y="307" width="54" height="92" rx="7" fill="#F2F4F7" stroke="#98A2B3" stroke-width="2"/>
    <rect x="705" y="321" width="40" height="7" rx="3" fill="#FDBA74"/><rect x="705" y="338" width="40" height="7" rx="3" fill="#D0D5DD"/><rect x="705" y="355" width="40" height="7" rx="3" fill="#D0D5DD"/><rect x="705" y="372" width="40" height="15" rx="5" fill="#F97316"/>
    <text x="725" y="425" text-anchor="middle" font-size="15" font-weight="800" fill="#162033">入力画面</text>
    <text x="725" y="444" text-anchor="middle" font-size="12" fill="#667085">6項目だけ</text>

    <rect x="807" y="290" width="102" height="162" rx="18" fill="#FFFFFF"/>
    <rect x="825" y="315" width="66" height="70" rx="6" fill="#F2F4F7"/><path d="M831 329h54M831 344h54M831 359h54M850 315v70" stroke="#98A2B3"/><rect x="831" y="346" width="54" height="13" fill="#FFEDD5"/>
    <text x="858" y="425" text-anchor="middle" font-size="15" font-weight="800" fill="#162033">自動整理</text>
    <text x="858" y="444" text-anchor="middle" font-size="12" fill="#667085">1つの一覧</text>

    <rect x="940" y="290" width="102" height="162" rx="18" fill="#FFFFFF"/>
    <circle cx="991" cy="349" r="34" fill="#FFF7ED"/><path d="M991 327v27M991 365v2" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
    <text x="991" y="425" text-anchor="middle" font-size="15" font-weight="800" fill="#162033">AIが印</text>
    <text x="991" y="444" text-anchor="middle" font-size="12" fill="#667085">曖昧な記述</text>

    <rect x="1073" y="290" width="50" height="162" rx="18" fill="#FFF7ED"/>
    <circle cx="1098" cy="340" r="14" fill="#F97316"/><path d="M1079 378c2-21 9-30 19-30s17 9 19 30" fill="#F97316"/>
    <path d="m1083 407 9 9 19-22" fill="none" stroke="#16A34A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1098" y="438" text-anchor="middle" font-size="12" font-weight="800" fill="#162033">人が確定</text>
  </g>
  <g stroke="#FDBA74" stroke-width="3" fill="none" marker-end="url(#navyArrow)">
    <path d="M778 370h24"/><path d="M911 370h24"/><path d="M1044 370h24"/>
  </g>
  <rect x="674" y="494" width="449" height="82" rx="16" fill="#22304A"/>
  <text x="700" y="526" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#FDBA74">役割分担</text>
  <text x="700" y="553" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" fill="#FFFFFF">AI＝抜け漏れ候補を示す　／　人＝確認して確定する</text>
</svg>
