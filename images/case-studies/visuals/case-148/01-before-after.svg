<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">原価計算のBefore・After</title><desc id="desc">紙メモ、電話・口頭、メール・チャットから届く情報を一つの入力画面に整える想定モデル</desc><rect width="1200" height="675" rx="32" fill="#F7F5F0"/>
  <text x="64" y="66" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#C2410C">想定モデル｜飲食店</text>
  <text x="64" y="105" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="28" font-weight="900" fill="#162033">原価計算を週12時間から2時間に減らした話</text>
  <rect x="54" y="175" width="500" height="436" rx="26" fill="#FFFFFF" stroke="#E6E1D8"/><rect x="78" y="199" width="112" height="34" rx="17" fill="#FEE2E2"/><text x="134" y="222" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#B42318">BEFORE</text>
  <text x="78" y="271" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="21" font-weight="900" fill="#162033">情報が別々に届く</text>
  <rect x="82" y="303" width="172" height="58" rx="14" fill="#FFF7ED" stroke="#FDBA74"/><circle cx="108" cy="332" r="12" fill="#F97316"/><text x="132" y="338" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#344054">紙メモ</text><path d="M266 332H350" stroke="#F04438" stroke-width="3"/><rect x="82" y="381" width="172" height="58" rx="14" fill="#FFF7ED" stroke="#FDBA74"/><circle cx="108" cy="410" r="12" fill="#F97316"/><text x="132" y="416" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#344054">電話・口頭</text><path d="M266 410H350" stroke="#F04438" stroke-width="3"/><rect x="82" y="459" width="172" height="58" rx="14" fill="#FFF7ED" stroke="#FDBA74"/><circle cx="108" cy="488" r="12" fill="#F97316"/><text x="132" y="494" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" font-weight="800" fill="#344054">メール・チャット</text><path d="M266 488H350" stroke="#F04438" stroke-width="3"/>
  <circle cx="417" cy="410" r="66" fill="#FEE4E2"/><circle cx="417" cy="388" r="19" fill="#F97066"/><path d="M382 450c4-30 17-44 35-44s31 14 35 44" fill="#F97066"/><text x="417" y="503" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16" font-weight="900" fill="#B42318">担当者に集中</text><text x="417" y="531" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" fill="#667085">探す・聞く・写す</text>
  <rect x="78" y="558" width="452" height="36" rx="10" fill="#FEF3F2"/><text x="304" y="581" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#B42318">変更のたびに最新版を確認</text>
  <rect x="646" y="175" width="500" height="436" rx="26" fill="#162033"/><rect x="670" y="199" width="102" height="34" rx="17" fill="#FFEDD5"/><text x="721" y="222" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#C2410C">AFTER</text><text x="670" y="271" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="21" font-weight="900" fill="#FFFFFF">入口をそろえ、人が確定</text>
  <rect x="670" y="318" width="98" height="148" rx="18" fill="#FFFFFF"/><circle cx="719" cy="365" r="26" fill="#FFF7ED"/><text x="719" y="373" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="21" font-weight="900" fill="#F97316">1</text><text x="719" y="425" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#162033">短い入力</text><rect x="783" y="318" width="98" height="148" rx="18" fill="#FFFFFF"/><circle cx="832" cy="365" r="26" fill="#FFF7ED"/><text x="832" y="373" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="21" font-weight="900" fill="#F97316">2</text><text x="832" y="425" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#162033">自動で一覧</text><rect x="896" y="318" width="98" height="148" rx="18" fill="#FFFFFF"/><circle cx="945" cy="365" r="26" fill="#FFF7ED"/><text x="945" y="373" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="21" font-weight="900" fill="#F97316">3</text><text x="945" y="425" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#162033">確認候補</text><rect x="1009" y="318" width="98" height="148" rx="18" fill="#FFFFFF"/><circle cx="1058" cy="365" r="26" fill="#ECFDF3"/><text x="1058" y="373" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="21" font-weight="900" fill="#027A48">4</text><text x="1058" y="425" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#162033">人が確定</text>
  <rect x="670" y="505" width="452" height="77" rx="16" fill="#22304A"/><text x="695" y="536" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#FDBA74">AIの役割</text><text x="695" y="563" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="14" fill="#FFFFFF">曖昧な箇所を示す。判断は担当者が行う。</text></svg>
